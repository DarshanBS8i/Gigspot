version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gigspot_db
    environment:
      POSTGRES_DB: gigspot
      POSTGRES_USER: gigspot_user
      POSTGRES_PASSWORD: gigspot_pass_2024
    ports:
      - "5432:5432"
    volumes:
      - gigspot_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gigspot_user -d gigspot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  gigspot_data:
